name: Quality Gate

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  playwright:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - run: corepack enable && corepack prepare yarn@stable --activate
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
        cache: 'yarn'
        cache-dependency-path: '**/yarn.lock'
    - name: Install dependencies
      run: yarn install --immutable
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        PLAYWRIGHT_TEST_BASE_URL: http://localhost:5173
        VITE_LOGIN_URL: https://openai.ki.fh-swf.de/api/login
        VITE_LOGOUT_URL: https://openai.ki.fh-swf.de/api/logout
        VITE_API_BASE_URL: https://openai.ki.fh-swf.de/api/v1
        VITE_USER_URL: https://openai.ki.fh-swf.de/api/user
        VITE_PROXY_URL: https://proxy.gawron.cloud/api
        VITE_DASHBOARD_URL: https://openai.ki.fh-swf.de/api/dashboard
    - name: Generate coverage report
      run: npx nyc report --reporter=lcov --report-dir=coverage
      if: ${{ !cancelled() }}
    - name: Comment Test Report on PR
      uses: actions/github-script@v7
      if: always() && github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          if (!fs.existsSync('playwright-report/results.json')) {
            console.log('No results.json found.');
            return;
          }
          const report = require('./playwright-report/results.json');
          const stats = report.stats;
          const duration = (stats.duration / 1000).toFixed(1);
          
          let body = `### Playwright Test Results 🎭\n\n`;
          body += `- **Passed:** ${stats.expected}\n`;
          body += `- **Failed:** ${stats.unexpected}\n`;
          body += `- **Flaky:** ${stats.flaky}\n`;
          body += `- **Skipped:** ${stats.skipped}\n`;
          body += `- **Duration:** ${duration}s\n\n`;
          
          if (stats.unexpected > 0) {
            body += `<details><summary>Failed Tests Details</summary>\n\n`;
            for (const suite of report.suites || []) {
              for (const spec of suite.specs || []) {
                for (const test of spec.tests || []) {
                  for (const result of test.results || []) {
                    if (result.status !== 'passed' && result.status !== 'skipped') {
                      body += `- ${spec.title}\n`;
                    }
                  }
                }
              }
            }
            body += `\n</details>\n`;
          }
          
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: SonarQube
      uses: sonarsource/sonarqube-scan-action@v6
      if: ${{ !cancelled() }}
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}