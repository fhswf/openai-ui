name: Build & Deploy

on:
  push:
    branches:
      - "main"
  milestone:
    types:
      - closed
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      
  build:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: ci-install token
        id: cicd
        uses: getsentry/action-github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
          
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.cicd.outputs.token }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/fhswf/openai-ui            
          tags: |
            type=sha,prefix=sha-,format=short,enable=true,priority=1100
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},value=${{ needs.release.outputs.tag_name }},enable=${{ needs.release.outputs.release_created == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.tag_name }},enable=${{ needs.release.outputs.release_created == 'true' }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.tag_name }},enable=${{ needs.release.outputs.release_created == 'true' }}
            type=raw,value=${{ needs.release.outputs.tag_name }},enable=${{ needs.release.outputs.release_created == 'true' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.release.outputs.release_created == 'true' && needs.release.outputs.tag_name || github.sha }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v1

      - name: Update Staging Kustomize Image
        run: |
          cd k8s/overlays/staging
          kustomize edit set image ghcr.io/fhswf/openai-ui=ghcr.io/fhswf/openai-ui:sha-$(echo ${{ github.sha }} | cut -c1-7)

      - name: Update Prod Kustomize Image
        if: needs.release.outputs.release_created == 'true'
        run: |
          cd k8s/overlays/prod
          kustomize edit set image ghcr.io/fhswf/openai-ui=ghcr.io/fhswf/openai-ui:${{ needs.release.outputs.tag_name }}

      - name: Commit Kustomize Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update kustomize images [skip ci]"
          file_pattern: "k8s/overlays/**/kustomization.yaml"
