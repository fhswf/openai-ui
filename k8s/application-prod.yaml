apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openai-ui-prod
  namespace: argocd

spec:
  destination:
    namespace: openai-proxy
    server: https://kubernetes.default.svc
  project: default
  source:
    path: k8s/overlays/prod
    repoURL: https://github.com/fhswf/openai-ui.git
    targetRevision: HEAD
