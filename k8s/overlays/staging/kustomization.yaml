apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namePrefix: staging-
namespace: staging-openai-proxy

configMapGenerator:
  - name: nginx-staging-conf
    files:
      - default.conf=nginx-staging.conf

patches:
  - path: deployment-patch.yaml
  - target:
      kind: Ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: openai.gawron.dev
