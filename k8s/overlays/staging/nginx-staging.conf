server {
    listen 80;
    
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://openai.fh-swf.de/api/;
        proxy_set_header Host openai.fh-swf.de;
        proxy_ssl_server_name on;
    }
}
