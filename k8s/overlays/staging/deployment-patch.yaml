apiVersion: apps/v1
kind: Deployment
metadata:
  name: openai-ui
  namespace: openai-proxy
spec:
  template:
    spec:
      containers:
        - name: openai-ui
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-staging-conf
